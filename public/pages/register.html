<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – Steps Premium Suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --navy: #1a2c3e; --gold: #c9933a; }
    body {
      font-family: 'Inter', sans-serif;
      background: #3c4864;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(201,147,58,0.15) 0%, rgb(75,89,122) 70%);
      pointer-events: none;
    }
    .container {
      max-width: 500px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }
    .card {
      background: white;
      border-radius: 28px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      padding: 48px 44px;
    }
    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .card-header .icon {
      font-size: 40px;
      color: var(--gold);
      margin-bottom: 12px;
    }
    .card-header h2 {
      font-size: 26px;
      color: #0f172a;
      font-weight: 600;
    }
    .card-header p {
      color: #64748b;
      font-size: 13px;
      margin-top: 4px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #334155;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      font-size: 14px;
      transition: all 0.2s;
      background: #f8fafc;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--gold);
      background: white;
      box-shadow: 0 0 0 3px rgba(201,147,58,0.1);
    }
    .btn-register {
      width: 100%;
      background: var(--gold);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-register:hover {
      background: #b8842f;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(201,147,58,0.3);
    }
    .btn-register:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-message { color: #ef4444; font-size: 12px; text-align: center; margin-top: 12px; }
    .success-message { color: #22c55e; font-size: 13px; text-align: center; margin-top: 12px; }
    .login-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #64748b;
    }
    .login-link a { color: var(--gold); text-decoration: none; font-weight: 600; }
    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <div class="icon"><i class="fas fa-user-plus"></i></div>
        <h2>Create Account</h2>
        <p>Register to access Steps Premium Suite</p>
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="user@gmail.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Create a password" required>
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="role">
            <option value="manager">Manager</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button type="submit" class="btn-register" id="submitBtn">Create Account →</button>
        <div class="error-message" id="errorMsg"></div>
        <div class="success-message" id="successMsg"></div>
      </form>

      <div class="login-link">
        Already have an account? <a href="/">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      btn.disabled = true;
      btn.textContent = 'Creating account...';
      errorMsg.textContent = '';
      successMsg.textContent = '';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fullName: document.getElementById('fullName').value.trim(),
            username: document.getElementById('username').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
            role: document.getElementById('role').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');
        successMsg.textContent = 'Account created successfully! Redirecting to login...';
        setTimeout(() => window.location.href = '/', 2000);
      } catch (err) {
        errorMsg.textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Create Account →';
      }
    });
  </script>
</body>
</html>
