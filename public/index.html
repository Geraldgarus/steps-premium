<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>Steps Premium Suite – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --navy: #1a2c3e;
      --gold: #c9933a;
      --white: #ffffff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #97b1f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Luxury gold gradient background */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(201,147,58,0.15) 0%, rgb(75, 89, 122) 70%);
      pointer-events: none;
    }

    /* Main Container */
    .container {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    /* Card Layout */
    .login-card {
      background: var(--white);
      border-radius: 28px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      overflow: hidden;
      display: flex;
      flex-wrap: wrap;
    }

    /* Left Side - Branding */
    .brand-side {
      flex: 1;
      background: linear-gradient(135deg, #1a2c3e 0%, #0f1a24 100%);
      padding: 48px 40px;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 280px;
    }

    .logo-icon {
      font-size: 52px;
      margin-bottom: 20px;
    }

    .brand-side h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .brand-side p {
      font-size: 13px;
      opacity: 0.7;
      line-height: 1.5;
    }

    .apt-icons {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .apt-icon {
      text-align: center;
      background: rgba(255,255,255,0.08);
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 11px;
      transition: all 0.2s;
    }

    .apt-icon span {
      font-size: 16px;
      margin-right: 5px;
    }

    /* Right Side - Login Form */
    .form-side {
      flex: 0.8;
      padding: 48px 44px;
      min-width: 320px;
      background: white;
    }

    .form-side h2 {
      font-size: 28px;
      color: #0f172a;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .form-side .subtitle {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #334155;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      font-size: 14px;
      transition: all 0.2s;
      background: #f8fafc;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
      background: white;
      box-shadow: 0 0 0 3px rgba(201,147,58,0.1);
    }

    .btn-login {
      width: 100%;
      background: var(--gold);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-login:hover {
      background: #b8842f;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(201,147,58,0.3);
    }

    .error-message {
      color: #ef4444;
      font-size: 12px;
      text-align: center;
      margin-top: 12px;
    }

    .register-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #64748b;
    }

    .register-link a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
    }

    .demo-credentials {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
      font-size: 11px;
      color: #64748b;
      text-align: center;
      background: #f8fafc;
      border-radius: 16px;
      padding: 16px;
    }

    .demo-credentials strong {
      color: #0f172a;
      display: block;
      margin-bottom: 6px;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 16px;
      }
      
      .login-card {
        flex-direction: column;
      }
      
      .brand-side {
        padding: 32px 24px;
        text-align: center;
      }
      
      .apt-icons {
        justify-content: center;
      }
      
      .form-side {
        padding: 32px 24px;
      }
      
      .brand-side h1 {
        font-size: 24px;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 12px;
      }
      
      .brand-side {
        padding: 24px 20px;
      }
      
      .logo-icon {
        font-size: 40px;
      }
      
      .form-side {
        padding: 28px 20px;
      }
      
      .form-side h2 {
        font-size: 24px;
      }
      
      .demo-credentials {
        margin-top: 20px;
        padding: 12px;
      }
    }

    /* Center the left side content */
.brand-side {
  text-align: center;
  align-items: center;
}

.logo-icon {
  margin-left: auto;
  margin-right: auto;
}

.brand-side h1 {
  text-align: center;
  width: 100%;
}

.brand-side p {
  text-align: center;
  max-width: 80%;
  margin-left: auto;
  margin-right: auto;
}

/* Center apartment icons */
.apt-icons {
  justify-content: center;
  width: 100%;
}
  </style>
</head>
<body>
  <div class="container">
    <div class="login-card">
      <!-- Left Side - Branding -->
      <div class="brand-side">
        <div class="logo-icon">🏨</div>
        <h1>Steps Premium Suite</h1>
        <p>Property management system for luxury stays.</p>
        <div class="apt-icons">
          <div class="apt-icon"><span>🏢</span> Elephant</div>
          <div class="apt-icon"><span>🏛️</span> Rhino</div>
          <div class="apt-icon"><span>🏰</span> Lion</div>
          <div class="apt-icon"><span>🏡</span> Leopard</div>
          <div class="apt-icon"><span>🏭</span> Buffalo</div>
        </div>
      </div>

      <!-- Right Side - Login Form -->
      <div class="form-side">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to access your dashboard</p>
        
        <form id="loginForm">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="user@gmail.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn-login" id="submitLogin">Sign In →</button>
          <div class="error-message" id="loginError"></div>
        </form>
        
        <div class="register-link">
        
        </div>
        
        <div class="demo-credentials">
          
        </div>
      </div>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');

    if (loginForm) {
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const submitBtn = document.getElementById('submitLogin');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in...';
        if (loginError) loginError.innerText = '';

        try {
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || 'Login failed');

          // ========== IMPORTANT: SAVE THE JWT TOKEN ==========
          sessionStorage.setItem('token', data.token);
          
          // Save user info
          sessionStorage.setItem('pms_user', JSON.stringify({
            id: data.id,
            username: data.username,
            fullName: data.fullName,
            email: data.email,
            role: data.role
          }));
          
          // Redirect to dashboard
          window.location.href = '/dashboard';
        } catch (err) {
          if (loginError) loginError.innerText = err.message;
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In →';
        }
      });
    }
  </script>
</body>
</html>
